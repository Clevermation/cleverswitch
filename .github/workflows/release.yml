name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Xcode 16 wählen (Swift 6)
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -switch "$XCODE"; fi
          swift --version

      - name: Version aus Tag ableiten
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Test
        run: swift test

      - name: .app bauen
        run: zsh packaging/assemble-app.sh "${{ steps.version.outputs.version }}"

      - name: Launch-Smoke-Test (Release-Build startet und lebt 5 s)
        run: |
          ./dist/CleverSwitch.app/Contents/MacOS/CleverSwitch &
          APP_PID=$!
          sleep 5
          # kill -0 allein reicht nicht: ein gecrashter Prozess bleibt als Zombie sichtbar,
          # bis der Parent wartet. Deshalb zusätzlich den Exit-Status ernten.
          if ! kill "$APP_PID" 2>/dev/null; then
            EXIT=0; wait "$APP_PID" || EXIT=$?
            echo "App ist innerhalb von 5 s gestorben (Exit: $EXIT)"
            exit 1
          fi
          wait "$APP_PID" 2>/dev/null || true

      - name: Zippen (ditto erhält die Bundle-Struktur)
        id: zip
        run: |
          cd dist
          ditto -c -k --keepParent "CleverSwitch.app" "CleverSwitch-${{ steps.version.outputs.version }}.zip"
          # SHA256 als Datei mitliefern (für den Homebrew-Cask, statt Abschreiben aus dem CI-Log)
          shasum -a 256 *.zip | tee SHA256SUMS.txt
          echo "sha256=$(shasum -a 256 *.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT" 

      - name: GitHub-Release anlegen (gh CLI statt Drittanbieter-Action)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip dist/SHA256SUMS.txt \
            --generate-notes --title "$GITHUB_REF_NAME"

      - name: Homebrew-Cask automatisch bumpen (optional — braucht TAP_PUSH_TOKEN-Secret)
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.zip.outputs.sha256 }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "Kein TAP_PUSH_TOKEN-Secret gesetzt — Cask bitte manuell bumpen:"
            echo "  version \"$VERSION\" / sha256 \"$SHA256\""
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Clevermation/homebrew-tap.git" tap
          cd tap
          sed -i '' -E "s/version \"[0-9.]+\"/version \"$VERSION\"/" Casks/cleverswitch.rb
          sed -i '' -E "s/sha256 \"[a-f0-9]+\"/sha256 \"$SHA256\"/" Casks/cleverswitch.rb
          git config user.name "cleverswitch-release"
          git config user.email "noreply@clevermation.com"
          git commit -am "cleverswitch $VERSION"
          git push
