      <text x="22" y="4.5" fill="#E9E9EE" font-size="13.5">p•••@g•••.com (max)</text>
      <text x="370" y="4.5" text-anchor="end" fill="#9A9AA2" font-size="12.5">5h 13% (2h 41m) · 7d 51%</text>
    </g>
    <g transform="translate(20,76)">
      <rect x="-12" y="-13" width="392" height="26" rx="6" fill="#5B8DEF" opacity="0.12"/>
