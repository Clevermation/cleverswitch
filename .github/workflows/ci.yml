name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Assemble .app (Smoke-Test)
        run: zsh packaging/assemble-app.sh 0.0.0-ci
