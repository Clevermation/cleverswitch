      <circle cx="7" cy="0" r="7" fill="#5B8DEF"/>
      <path d="M3.6 0 L6 2.4 L10.6 -2.6" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
