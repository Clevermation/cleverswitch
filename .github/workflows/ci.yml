name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Xcode 16 wählen (Swift 6)
        run: |
          XCODE=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE" ]; then sudo xcode-select -switch "$XCODE"; fi
          swift --version
      - name: Format-Lint (swift format, Konfiguration in .swift-format)
        run: swift format lint --strict --recursive Sources Tests
      - name: Build
        run: swift build
      - name: Test
        run: swift test
      - name: Assemble .app (Smoke-Test)
        run: zsh packaging/assemble-app.sh 0.0.0-ci
      - name: Launch-Smoke-Test (App startet und lebt 5 s)
        run: |
          ./dist/CleverSwitch.app/Contents/MacOS/CleverSwitch &
          APP_PID=$!
          sleep 5
          # kill -0 allein reicht nicht: ein gecrashter Prozess bleibt als Zombie sichtbar,
          # bis der Parent wartet. Deshalb zusätzlich den Exit-Status ernten.
          if ! kill "$APP_PID" 2>/dev/null; then
            EXIT=0; wait "$APP_PID" || EXIT=$?
            echo "App ist innerhalb von 5 s gestorben (Exit: $EXIT)"
            exit 1
          fi
          wait "$APP_PID" 2>/dev/null || true
