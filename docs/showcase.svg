      <text x="22" y="4.5" fill="#FFFFFF" font-size="13.5" font-weight="500">t•••@c•••.com (max)</text>
      <text x="370" y="4.5" text-anchor="end" fill="#B7B7BE" font-size="12.5">5h 13% (2h 41m) · 7d 51%</text>
